<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>内容灵感台 · Content Studio</title>
  <link rel="icon" href="assets/blindbox/7660891536582918681.jpeg?v=1" type="image/jpeg" />
  <link rel="apple-touch-icon" href="assets/blindbox/7660891536582918681.jpeg?v=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css?v=4" />
</head>
<body>
  <div class="app">
    <!-- 侧边栏：独立板块导航 -->
    <aside class="sidebar">
      <div class="brand">
        <img class="brand-mark" src="assets/blindbox/7660891536582918681.jpeg" alt="logo" />
        <div class="brand-text">
          <div class="brand-name">内容灵感台</div>
          <div class="brand-sub">Content Studio</div>
        </div>
      </div>
      <nav class="nav" id="nav"></nav>
      <div class="sidebar-foot">
        <div class="src-pill" id="src-pill">演示数据</div>
        <div class="foot-hint">定时管线接入飞书后自动切换真实数据源</div>
      </div>
    </aside>

    <!-- 主区 -->
    <main class="main">
      <header class="topbar">
        <div class="topbar-left">
          <h1 class="board-title" id="board-title">灵感库</h1>
          <span class="board-sub" id="board-sub"></span>
        </div>
        <div class="topbar-right">
          <div class="search-box">
            <svg viewBox="0 0 24 24" class="ic"><path d="M21 21l-4.3-4.3M11 19a8 8 0 1 1 0-16 8 8 0 0 1 0 16z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            <input id="global-search" type="text" placeholder="搜索内容文案…" autocomplete="off" />
          </div>
          <button class="btn-filter" id="filter-toggle">
            <svg viewBox="0 0 24 24" class="ic"><path d="M3 5h18M6 12h12M10 19h4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            筛选 <span class="filter-count" id="filter-count"></span>
          </button>
          <button class="btn-lang" id="lang-toggle" title="切换正文语言（导航保持中文）">
            <span class="lang-opt" data-lang="en">EN</span><span class="lang-sep">/</span><span class="lang-opt" data-lang="zh">中</span>
          </button>
        </div>
      </header>

      <!-- 全局筛选面板（跨板块生效 = 组合筛选） -->
      <div class="filter-panel" id="filter-panel">
        <div class="fp-facets" id="fp-facets"></div>
        <div class="fp-range">
          <div class="fp-range-group">
            <label>爆款率下限</label>
            <input type="range" id="viral-min" min="0" max="100" value="0" step="1" />
            <span class="range-val" id="viral-min-val">0</span>
          </div>
          <div class="fp-range-group">
            <label>时间范围</label>
            <input type="date" id="date-from" />
            <span class="range-sep">~</span>
            <input type="date" id="date-to" />
          </div>
          <div class="fp-range-group fp-top">
            <label class="chk"><input type="checkbox" id="top-only" /> 只看爆款 (Top 10%)</label>
          </div>
        </div>
      </div>

      <!-- 已选筛选条件（可单独移除 = 二次细分） -->
      <div class="active-filters" id="active-filters"></div>

      <!-- 板块内容 -->
      <section class="board" id="board"></section>
    </main>
  </div>

  <!-- 详情抽屉 -->
  <div class="drawer-overlay" id="drawer-overlay"></div>
  <aside class="drawer" id="drawer"></aside>

  <!-- 单帖深度分析弹层（灵感库三级深度 · Level 3） -->
  <div class="deep-overlay" id="deep-overlay"></div>
  <div class="deep-modal" id="deep-modal">
    <div class="deep-head">
      <div class="deep-title">
        <span class="deep-kicker">单帖深度分析</span>
        <span class="deep-sub" id="deep-sub"></span>
      </div>
      <button class="deep-close" id="deep-close">×</button>
    </div>
    <div class="deep-body" id="deep-body"></div>
  </div>

  <!-- 高互动用户综合深度分析弹层 -->
  <div class="deep-overlay" id="seg-overlay"></div>
  <div class="deep-modal" id="seg-modal">
    <div class="deep-head">
      <div class="deep-title">
        <span class="deep-kicker">📊 高互动用户综合深度分析</span>
        <span class="deep-sub" id="seg-sub"></span>
      </div>
      <button class="deep-close" id="seg-close">×</button>
    </div>
    <div class="deep-body" id="seg-body"></div>
  </div>

  <!-- 每日灵感盲盒（全屏居中抽卡弹层） -->
  <div class="bx-overlay" id="bx-overlay"></div>
  <div class="bx-modal" id="bx-modal">
    <div class="bx-modal-head">
      <span class="bx-modal-title">🎁 每日灵感盲盒 · <span id="bx-modal-date"></span></span>
      <div class="bx-modal-tools">
        <button class="mini-btn" id="bx-redraw">🎲 重抽</button>
        <button class="mini-btn ghost" id="bx-close">×</button>
      </div>
    </div>
    <div class="bx-modal-body" id="bx-modal-body">
      <div class="blindbox-grid bx-modal-grid" id="bx-grid"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="js/data.js?v=4"></script>
  <script src="js/analysis.js?v=4"></script>
  <script src="js/app.js?v=5"></script>
</body>
</html>
